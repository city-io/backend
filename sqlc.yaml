version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations/"
    queries: "db/queries/"
    gen:
      go:
        package: "database"
        out: "internal/database"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "coordinates"
            go_type:
              import: "cityio/internal/models"
              type: "Coordinates"