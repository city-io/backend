name: Build Docker Image

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.prayujt.com
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            docker.prayujt.com/cityio-backend:latest
            docker.prayujt.com/cityio-backend:${{ github.sha }}
          cache-from: type=registry,ref=docker.prayujt.com/cityio-backend:cache
          cache-to: type=registry,ref=docker.prayujt.com/cityio-backend:cache,mode=max